id: "hw-060"
source: "教材习题p126"
lesson: 10
type: "homework"
knowledge:
  - Gershgorin
  - 盖尔圆盘
  - 谱半径
problem: |
  设 A\in\mathbb C^{n\times n} 可逆，B\in\mathbb C^{n\times n}，若对某种矩阵范数有 \|B\| < \frac{1}{\|A^{-1}\|}，则 A+B 可逆。
steps:
  - title: '分解并估计扰动'
    content: |
      将 A+B 分解为
      A+B = A(I + A^{-1}B).
      因 A 可逆，只需证 I+A^{-1}B 可逆。
  - title: '利用范数条件'
    content: |
      由矩阵范数的相容性，
      \|A^{-1}B\| \le \|A^{-1}\|\cdot\|B\| < \|A^{-1}\|\cdot\frac{1}{\|A^{-1}\|} = 1.
  - title: 'Neumann 级数论证'
    content: |
      因 \|A^{-1}B\| < 1，Neumann 级数 \sum_{k=0}^\infty (-A^{-1}B)^k 收敛，且其和为 (I+A^{-1}B)^{-1}。
      故 I+A^{-1}B 可逆，从而 A+B 可逆。
