id: "hw-009"
source: "教材习题p7-13"
lesson: 1
type: "homework"
knowledge:
  - 线性空间
  - 子空间判定
  - 直和
problem: |
  试证明所有二阶矩阵之集合形成的实线性空间，是所有二阶实对称矩阵之集合形成的子空间与所有二阶反对称矩阵之集合形成的子空间的直和。
steps:
  - title: '定义子空间并证明和空间'
    content: |
      设 S=\{A\in\mathbb{R}^{2\times 2}\mid A^T=A\}（对称矩阵空间），
      K=\{A\in\mathbb{R}^{2\times 2}\mid A^T=-A\}（反对称矩阵空间）。
      
      \textbf{第一步：证明 } \mathbb{R}^{2\times 2}=S+K
      
      任取 A\in\mathbb{R}^{2\times 2}，构造：
      A = \frac{A+A^T}{2} + \frac{A-A^T}{2}
      
      验证：
      \left(\dfrac{A+A^T}{2}\right)^T = \dfrac{A^T+A}{2} = \dfrac{A+A^T}{2}，故第一项 \in S；
      \left(\dfrac{A-A^T}{2}\right)^T = \dfrac{A^T-A}{2} = -\dfrac{A-A^T}{2}，故第二项 \in K。
      
      因此任意二阶矩阵可分解为对称阵与反对称阵之和，即 \mathbb{R}^{2\times 2}=S+K。
  - title: '证明直和'
    content: |
      \textbf{第二步：证明 } S\cap K = \{0\}
      
      设 B\in S\cap K，则 B 同时满足：
      B^T = B \quad\text{且}\quad B^T = -B
      
      于是 B=-B，即 2B=O，故 B=O。
      
      \textbf{结论}：\mathbb{R}^{2\times 2} = S \oplus K。
