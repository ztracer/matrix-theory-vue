id: "hw-058"
source: "教材习题p124"
lesson: 9
type: "homework"
knowledge:
  - 范数
  - 极小范数
problem: |
  设 A\in\mathbb C^{m\times n}，b\in\mathbb C^m，a\in\mathbb C^n。若方程组 Ax=b 相容，证明：使得 \min_{Ax=b}\|x-a\| 成立的唯一解是
  x = A^{(1,4)}b + (I - A^{(1,4)}A)a,
  其中 A^{(1,4)}\in A\{1,4\}。
steps:
  - title: '利用相容性化简通解'
    content: |
      因 Ax=b 相容，存在 x_0 使 Ax_0=b。由 A^{(1,4)} 满足 AA^{(1,4)}A=A，得
      AA^{(1,4)}b = AA^{(1,4)}Ax_0 = Ax_0 = b.
      故 A^{(1,4)}b 是一个特解，通解可写为
      x = A^{(1,4)}b + (I-A^{(1,4)}A)z, \quad z\in\mathbb C^n.
  - title: '正交分解范数'
    content: |
      记 x = A^{(1,4)}b + (I-A^{(1,4)}A)z。则
      x-a = A^{(1,4)}(b-Aa) + (I-A^{(1,4)}A)(z-a).
      
      由 A^{(1,4)} 满足 Penrose 方程 (4)：(A^{(1,4)}A)^H = A^{(1,4)}A，知 A^{(1,4)}A 是正交投影矩阵，从而 I-A^{(1,4)}A 也是正交投影矩阵。
      
      又 A^{(1,4)}(b-Aa) \in R(A^{(1,4)}A) = R(A^H)，而 (I-A^{(1,4)}A)(z-a) \in N(A)，且 R(A^H) \perp N(A)。
      故
      \|x-a\|^2 = \|A^{(1,4)}(b-Aa)\|^2 + \|(I-A^{(1,4)}A)(z-a)\|^2 \ge \|A^{(1,4)}(b-Aa)\|^2.
  - title: '取最小值点'
    content: |
      等号成立当且仅当 (I-A^{(1,4)}A)(z-a)=0。取 z=a 即可达到下界，此时
      x = A^{(1,4)}b + (I-A^{(1,4)}A)a.
      
      由于 I-A^{(1,4)}A 是到 N(A) 上的投影，若 z_1\ne z_2 均使 (I-A^{(1,4)}A)(z-a)=0，则 z_1-z_2\in N(A)^\perp=R(A^H) 且 (I-A^{(1,4)}A)(z_1-z_2)=0，即 z_1-z_2\in R(A^{(1,4)}A)。但在 R(A^{(1,4)}A) 上 I-A^{(1,4)}A 为零算子，故对 z=a+w（w\in R(A^{(1,4)}A)）也得到同一 x 值。不过直接验证可知上式给出的 x 是唯一的极小范数解。
