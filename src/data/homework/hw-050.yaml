id: "hw-050"
source: "教材习题p95 第4题(1)"
lesson: 8
type: "homework"
knowledge:
  - 投影矩阵
  - 幂等性
problem: |
  设 P_1,P_2 均为投影矩阵，证明：P=P_1+P_2 是投影矩阵的充要条件是 P_1P_2=P_2P_1=O。
steps:
  - title: '充分性'
    content: |
      若 P_1P_2=P_2P_1=O，则 P^2=(P_1+P_2)^2=P_1^2+P_1P_2+P_2P_1+P_2^2=P_1+P_2=P。故 P 幂等，从而是投影矩阵。
  - title: '必要性'
    content: |
      若 P=P_1+P_2 为投影矩阵，则 P^2=P，即 P_1+P_2=(P_1+P_2)^2=P_1+P_1P_2+P_2P_1+P_2，故 P_1P_2+P_2P_1=O (*)。
      左乘 P_1：P_1P_2+P_1P_2P_1=O；右乘 P_1：P_1P_2P_1+P_2P_1=O。两式相减得 P_1P_2=P_2P_1。代入 (*) 得 2P_1P_2=O，即 P_1P_2=P_2P_1=O。
