id: "10-1"
source: "2021年期末真题"
lesson: 10
knowledge:
  - 盖尔圆盘
  - Gershgorin
  - 特征值估计
problem: |
  用盖尔圆盘定理估计矩阵 A=\begin{pmatrix}20&3&2\\1&10&1\\2&3&0\end{pmatrix} 的特征值分布，并证明A可对角化。
steps:
  - title: "画盖尔圆盘"
    content: |
      G_1:|z-20|\leq 5；G_2:|z-10|\leq 2；G_3:|z|\leq 5。
  - title: "隔离分析"
    content: |
      G_1与G_2,G_3不交（20-5=15>10+2=12, 20-5=15>5），G_2与G_3不交（10-2=8>5）。三个圆盘互不相交！
  - title: "结论"
    content: |
      每个圆盘恰含一个特征值，三个特征值互不相同，故A可对角化（3个线性无关特征向量）。
