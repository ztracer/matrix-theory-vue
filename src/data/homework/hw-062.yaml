id: "hw-062"
source: "教材习题p131"
lesson: 10
type: "homework"
knowledge:
  - 相似
  - Gershgorin
  - 盖尔圆盘
problem: |
  证明矩阵
  A = \begin{pmatrix} 2 & \frac{2}{n} & \frac{1}{n} & \cdots & \frac{1}{n} \\ \frac{1}{n} & 4 & \frac{1}{n} & \cdots & \frac{1}{n} \\ \vdots & \vdots & \vdots & & \vdots \\ \frac{1}{n} & \frac{1}{n} & \frac{1}{n} & \cdots & 2n \end{pmatrix}
  能够相似于对角矩阵，且 A 的特征值都是实数。
steps:
  - title: '识别矩阵结构'
    content: |
      观察矩阵 A：对角元为 2,4,\dots,2n；非对角元均为 \frac1n。
      显然 A 是实矩阵，且 A^T = A，即 A 为**实对称矩阵**。
  - title: '利用实对称矩阵性质'
    content: |
      实对称矩阵必可**正交相似**于对角矩阵，即存在正交矩阵 Q 使
      Q^TAQ = \operatorname{diag}(\lambda_1,\lambda_2,\dots,\lambda_n),
      其中 \lambda_i 为实数。
      
      因此 A 当然也可相似于对角矩阵，且所有特征值均为实数。
