id: "06-3"
source: "2025年期末真题"
lesson: 6
knowledge:
  - SVD
  - 奇异值分解
  - 低秩逼近
problem: |
  设 A=\begin{pmatrix}1&2\\2&1\\1&-1\end{pmatrix}，求A的奇异值分解A=U\Sigma V^T，并给出A的最佳秩1逼近A_1。
steps:
  - title: "计算AᵀA"
    content: |
      A^TA=\begin{pmatrix}6&3\\3&6\end{pmatrix}，特征方程\det(A^TA-\lambda I)=\lambda^2-12\lambda+27=0，\lambda_1=9, \lambda_2=3。奇异值\sigma_1=3, \sigma_2=\sqrt{3}。
  - title: "求V"
    content: |
      v_1对应\lambda_1=9：(A^TA-9I)x=0\to x_1=x_2，v_1=\frac{1}{\sqrt{2}}(1,1)^T。v_2对应\lambda_2=3：(A^TA-3I)x=0\to x_1=-x_2，v_2=\frac{1}{\sqrt{2}}(1,-1)^T。V=[v_1,v_2]。
  - title: "求U的前两列"
    content: |
      u_1=Av_1/\sigma_1=\frac{1}{3\sqrt{2}}(3,3,0)^T=\frac{1}{\sqrt{2}}(1,1,0)^T。u_2=Av_2/\sigma_2=\frac{1}{\sqrt{6}}(-1,1,2)^T。
  - title: "扩充U的第三列"
    content: |
      u_3需与u_1,u_2正交。可取u_3=\frac{1}{\sqrt{3}}(1,-1,1)^T（验证：u_1\cdot u_3=0, u_2\cdot u_3=0）。
  - title: "SVD"
    content: |
      U=\begin{pmatrix}1/\sqrt{2}&-1/\sqrt{6}&1/\sqrt{3}\\1/\sqrt{2}&1/\sqrt{6}&-1/\sqrt{3}\\0&2/\sqrt{6}&1/\sqrt{3}\end{pmatrix}, \Sigma=\begin{pmatrix}3&0\\0&\sqrt{3}\\0&0\end{pmatrix}, V如上。
  - title: "最佳秩1逼近"
    content: |
      A_1=\sigma_1u_1v_1^T=3\cdot\frac{1}{\sqrt{2}}(1,1,0)^T\cdot\frac{1}{\sqrt{2}}(1,1)=\frac{3}{2}\begin{pmatrix}1&1\\1&1\\0&0\end{pmatrix}。
