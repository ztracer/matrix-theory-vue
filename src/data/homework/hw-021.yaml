id: "hw-021"
source: "教材习题p39-5"
lesson: 4
type: "homework"
knowledge:
  - 矩阵指数
  - 矩阵函数
  - 导数
problem: |
  设 A=\begin{pmatrix}2&1&0\\0&0&1\\0&1&0\end{pmatrix}，求 e^A、e^{tA}(t\in\mathbb{R})、\sin A。
steps:
  - title: '求特征值与对角化'
    content: |
      特征多项式：
      \det(\lambda I-A) = (\lambda-2)\begin{vmatrix}\lambda&-1\\-1&\lambda\end{vmatrix} = (\lambda-2)(\lambda^2-1)
      
      **特征值**：\lambda_1=2,\; \lambda_2=1,\; \lambda_3=-1，互异，故 A 可对角化。
      
      **特征向量**：
      - \lambda_1=2：v_1=(1,0,0)^T
      - \lambda_2=1：v_2=(-1,1,1)^T
      - \lambda_3=-1：v_3=(1,-3,3)^T
      
      令 P=\begin{pmatrix}1&-1&1\\0&1&-3\\0&1&3\end{pmatrix}，则 P^{-1}AP=\text{diag}(2,1,-1)=D。
      
      计算得 P^{-1}=\begin{pmatrix}1&\frac{2}{3}&\frac{1}{3}\\0&\frac{1}{2}&\frac{1}{2}\\0&-\frac{1}{6}&\frac{1}{6}\end{pmatrix}。
  - title: '求 e^A'
    content: |
      e^A = P\cdot\text{diag}(e^2,e,e^{-1})\cdot P^{-1}
      
      经矩阵乘法计算：
      e^A = \begin{pmatrix} e^2 & \frac{2e^2}{3}-\frac{e}{2}-\frac{e^{-1}}{6} & \frac{e^2}{3}-\frac{e}{2}+\frac{e^{-1}}{6} \\ 0 & \frac{e+e^{-1}}{2} & \frac{e-e^{-1}}{2} \\ 0 & \frac{e-e^{-1}}{2} & \frac{e+e^{-1}}{2} \end{pmatrix}
      
      右下角 2\times 2 块可写为 \begin{pmatrix}\cosh 1&\sinh 1\\\sinh 1&\cosh 1\end{pmatrix}。
  - title: '求 e^{tA}'
    content: |
      将上式中的 e^2\to e^{2t}，e\to e^t，e^{-1}\to e^{-t}，得：
      e^{tA} = \begin{pmatrix} e^{2t} & \frac{2e^{2t}}{3}-\frac{e^t}{2}-\frac{e^{-t}}{6} & \frac{e^{2t}}{3}-\frac{e^t}{2}+\frac{e^{-t}}{6} \\ 0 & \frac{e^t+e^{-t}}{2} & \frac{e^t-e^{-t}}{2} \\ 0 & \frac{e^t-e^{-t}}{2} & \frac{e^t+e^{-t}}{2} \end{pmatrix}
      
      右下角即为 \begin{pmatrix}\cosh t&\sinh t\\\sinh t&\cosh t\end{pmatrix}。
  - title: '求 \sin A'
    content: |
      \sin A = P\cdot\text{diag}(\sin 2,\sin 1,\sin(-1))\cdot P^{-1} = P\cdot\text{diag}(\sin 2,\sin 1,-\sin 1)\cdot P^{-1}
      
      计算得：
      \sin A = \begin{pmatrix} \sin 2 & \frac{2\sin 2}{3}-\sin 1 & \frac{\sin 2}{3} \\ 0 & 0 & \sin 1 \\ 0 & \sin 1 & 0 \end{pmatrix}
