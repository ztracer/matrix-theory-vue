id: "02-3"
source: "2021年期末真题"
lesson: 2
knowledge:
  - 线性变换
  - 核与像
  - 秩-零化度定理
problem: |
  设$T$是$\R^3$中的线性变换，$T(x,y,z)^T=(x+2y-z,y+z,x+y-2z)^T$。求$T$在基$\varepsilon_1,\varepsilon_2,\varepsilon_3$下的矩阵$A$，并求$\ker T$和$\operatorname{Im} T$。
steps:
  - title: "求矩阵A"
    content: |
      $T(\varepsilon_1)=(1,0,1)^T, T(\varepsilon_2)=(2,1,1)^T, T(\varepsilon_3)=(-1,1,-2)^T$，故$A=[T(\varepsilon_1),T(\varepsilon_2),T(\varepsilon_3)]$。
  - title: "求Ker T"
    content: |
      解$Ax=0$：$r(A)=2$，基础解系含1个向量，$\ker T=\operatorname{span}\{\xi\}$。
  - title: "求Im T"
    content: |
      $\operatorname{Im} T=\operatorname{span}\{T(\varepsilon_1),T(\varepsilon_2),T(\varepsilon_3)\}$，维数$=r(A)=2$，取$A$中两线性无关列为基。
