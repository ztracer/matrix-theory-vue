id: "hw-034"
source: "教材习题p79 第1题(1)"
lesson: 7
type: "homework"
knowledge:
  - 满秩分解
  - Moore-Penrose
  - 广义逆
problem: |
  求矩阵 A=\begin{pmatrix}1&2&3&0\\0&2&1&-1\\1&0&2&1\end{pmatrix} 的满秩分解。
steps:
  - title: '求秩与 pivot 列'
    content: |
      对 A 做行初等变换：R_3\leftarrow R_3-R_1 得 \begin{pmatrix}1&2&3&0\\0&2&1&-1\\0&-2&-1&1\end{pmatrix}，再 R_3\leftarrow R_3+R_2 得 \begin{pmatrix}1&2&3&0\\0&2&1&-1\\0&0&0&0\end{pmatrix}。秩为 2，主元列在第 1,2 列。
  - title: '取 B 与行最简形 C'
    content: |
      取 A 的前两列为 B=\begin{pmatrix}1&2\\0&2\\1&0\end{pmatrix}。继续化简为行最简形：R_2\leftarrow R_2/2，R_1\leftarrow R_1-2R_2，得 C=\begin{pmatrix}1&0&2&1\\0&1&\frac12&-\frac12\end{pmatrix}。
  - title: '验证'
    content: |
      计算 BC=\begin{pmatrix}1&2\\0&2\\1&0\end{pmatrix}\begin{pmatrix}1&0&2&1\\0&1&\frac12&-\frac12\end{pmatrix}=\begin{pmatrix}1&2&3&0\\0&2&1&-1\\1&0&2&1\end{pmatrix}=A，分解正确。
