id: "hw-017"
source: "教材习题p31-19(1)"
lesson: 3
type: "homework"
knowledge:
  - Jordan标准形
  - 对角化
problem: |
  求矩阵 A=\begin{pmatrix}1&2&0\\0&2&0\\-2&-1&-1\end{pmatrix} 的 Jordan 标准形。
steps:
  - title: '求特征多项式'
    content: |
      \det(\lambda I-A) = \begin{vmatrix} \lambda-1 & -2 & 0 \\ 0 & \lambda-2 & 0 \\ 2 & 1 & \lambda+1 \end{vmatrix} = (\lambda-2)\begin{vmatrix} \lambda-1 & 0 \\ 2 & \lambda+1 \end{vmatrix}
      = (\lambda-2)(\lambda-1)(\lambda+1)
      
      **特征值**：\lambda_1=2,\; \lambda_2=1,\; \lambda_3=-1，三个互异特征值。
  - title: '确定 Jordan 标准形'
    content: |
      由于三个特征值互不相同，每个特征值的代数重数与几何重数均为 1，矩阵 A **可对角化**。
      
      **Jordan 标准形为**：
      J = \begin{pmatrix} 2 & 0 & 0 \\ 0 & 1 & 0 \\ 0 & 0 & -1 \end{pmatrix}
