id: "hw-045"
source: "教材习题p135"
lesson: 7
type: "homework"
knowledge:
  - Moore-Penrose
  - 广义逆
  - Penrose方程
  - 幂等矩阵
problem: |
  设 H^2 是幂等 Hermite 矩阵，且 \operatorname{rank}(H^2) = \operatorname{rank}(H)，证明 H = H^+。
steps:
  - title: '分析条件'
    content: |
      已知 H^2 幂等：(H^2)^2 = H^2，即 H^4 = H^2。
      已知 H^2 Hermite：(H^2)^H = H^2。
      由 \operatorname{rank}(H^2) = \operatorname{rank}(H)，且 R(H^2) \subseteq R(H)，得 R(H^2)=R(H)；同理 N(H^2)=N(H)。
  - title: '证明 H³ = H'
    content: |
      对任意 x，Hx \in R(H) = R(H^2)，故存在 y 使 Hx = H^2y。
      于是
      H^3x = H^2(Hx) = H^2(H^2y) = H^4y = H^2y = Hx.
      由 x 的任意性，得 H^3 = H。
  - title: '验证四个 Penrose 方程（以 A=H, X=H）'
    content: |
      (1) HXH = HHH = H^3 = H；
      (2) XHX = HHH = H^3 = H = X；
      (3) (HX)^H = (H^2)^H = H^2 = HH = HX；
      (4) (XH)^H = (H^2)^H = H^2 = HH = XH。
      
      四个方程均成立，故 H 是 H 的 Moore-Penrose 广义逆，即 H = H^+。
