id: "01-2"
source: "经典习题"
lesson: 1
knowledge:
  - 线性空间
  - 子空间判定
problem: |
  判断下列集合是否为 $\R^{3}$ 的子空间：(1) $W_1=\{(x,y,z)^T \mid x+y+z=0\}$；(2) $W_2=\{(x,y,z)^T \mid xyz=0\}$；(3) $W_3=\{(x,y,z)^T \mid x=y=z\}$。
steps:
  - title: "W₁判定"
    content: |
      零向量$\in W_1$；对$\forall\alpha,\beta\in W_1,k\in\mathbb{R}$，$(k\alpha+l\beta)$各分量之和$=k\cdot 0+l\cdot 0=0$，故$k\alpha+l\beta\in W_1$。$W_1$是子空间。
  - title: "W₂判定"
    content: |
      取$\alpha=(1,1,0)^T,\beta=(0,1,1)^T\in W_2$，$\alpha+\beta=(1,2,1)^T$，各分量乘积$=2\neq 0$，不封闭。$W_2$不是子空间。
  - title: "W₃判定"
    content: |
      $W_3$是过原点直线。零向量$\in W_3$；$k\alpha+l\beta$各分量相等，属于$W_3$。$W_3$是子空间（维数为1）。
