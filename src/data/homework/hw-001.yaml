id: "hw-001"
source: "教材习题p1-3"
lesson: 1
type: "homework"
knowledge:
  - 线性空间
  - 子空间判定
  - 公理
  - 基与维数
problem: |
  判别下列集合对所指运算是否构成 \mathbb{R} 上的线性空间：
  (1) 次数等于 m(m \ge 1) 的实系数多项式的集合，对于多项式的加法和数与多项式的乘法；
  (2) 实对称矩阵的集合，对于矩阵的加法和实数与矩阵的乘法；
  (3) 平面上全体向量的集合，对于通常的加法和如下定义的数乘运算 k \circ x = 0。
steps:
  - title: '(1) 次数等于 m 的实系数多项式集合'
    content: |
      **结论：不构成线性空间。**
      
      **反例说明加法不封闭：**
      取 f(t)=t^m+1，g(t)=-t^m+2，二者都是次数为 m 的实系数多项式。
      但 f(t)+g(t)=3，其次数为 0 \ne m，不在该集合中。
      
      **另一关键原因：** 零多项式 0(t) 的次数通常定义为 -\infty（或至少不等于 m），因此零多项式不在该集合中，不满足线性空间必须有零元的公理。
  - title: '(2) 实对称矩阵的集合'
    content: |
      **结论：构成线性空间。**
      
      设 V=\{A\in\mathbb{R}^{n\times n}\mid A^T=A\}，验证八条公理：
      
      1. **加法封闭性**：若 A^T=A，B^T=B，则 (A+B)^T=A^T+B^T=A+B，故 A+B\in V。
      2. **数乘封闭性**：(kA)^T=kA^T=kA，故 kA\in V。
      3. **零元**：O^T=O，零矩阵属于 V。
      4. **负元**：(-A)^T=-A^T=-A，故 -A\in V。
      5. 加法结合律、交换律，以及数乘分配律等均由矩阵运算继承。
      
      因此 V 是 \mathbb{R}^{n\times n} 的线性子空间。
  - title: '(3) 平面向量配特殊数乘 k\circ x=0'
    content: |
      **结论：不构成线性空间。**
      
      线性空间要求数乘满足：**1\circ x = x**（单位元性质）。
      
      但按题设定义，对任意向量 x，有 1\circ x = 0 \ne x（只要 x\ne 0）。
      
      因此该运算不满足线性空间的基本公理，不能构成线性空间。
