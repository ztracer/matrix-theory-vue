id: "hw-004"
source: "教材习题p1-6"
lesson: 1
type: "homework"
knowledge:
  - 基与维数
  - 坐标
problem: |
  求 \mathbb{R}^3 中向量 x=(3,7,1)^T 对基 x_1=(1,3,5)^T, x_2=(6,3,2)^T, x_3=(3,1,0)^T 的坐标。
steps:
  - title: '建立线性方程组'
    content: |
      设坐标为 (a,b,c)^T，则 x = a x_1 + b x_2 + c x_3，即：
      \begin{pmatrix}3\\7\\1\end{pmatrix} = a\begin{pmatrix}1\\3\\5\end{pmatrix} + b\begin{pmatrix}6\\3\\2\end{pmatrix} + c\begin{pmatrix}3\\1\\0\end{pmatrix}
      
      分量方程组：
      \begin{cases} a + 6b + 3c = 3 \\ 3a + 3b + c = 7 \\ 5a + 2b = 1 \end{cases}
  - title: '求解方程组'
    content: |
      由第三式得 b = \dfrac{1-5a}{2}。
      
      代入第二式：
      3a + 3\cdot\frac{1-5a}{2} + c = 7
      6a + 3 - 15a + 2c = 14 \Rightarrow -9a + 2c = 11 \Rightarrow c = \frac{11+9a}{2}
      
      将 b,c 代入第一式：
      a + 6\cdot\frac{1-5a}{2} + 3\cdot\frac{11+9a}{2} = 3
      2a + 6(1-5a) + 3(11+9a) = 6
      2a + 6 - 30a + 33 + 27a = 6 \Rightarrow -a + 39 = 6 \Rightarrow a = 33
      
      回代得：
      b = \frac{1-165}{2} = -82, \quad c = \frac{11+297}{2} = 154
  - title: '验证与结论'
    content: |
      验证：
      33(1,3,5) - 82(6,3,2) + 154(3,1,0) = (33-492+462,\; 99-246+154,\; 165-164) = (3,7,1)
      
      \textbf{坐标为} \boxed{(33,\,-82,\,154)^T}。
