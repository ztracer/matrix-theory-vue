id: "hw-051"
source: "教材习题p95 第4题(2)"
lesson: 8
type: "homework"
knowledge:
  - 投影矩阵
  - 幂等性
problem: |
  设 P_1,P_2 均为投影矩阵，证明：P=P_1-P_2 是投影矩阵的充要条件是 P_1P_2=P_2P_1=P_2。
steps:
  - title: '充分性'
    content: |
      若 P_1P_2=P_2P_1=P_2，则 P^2=(P_1-P_2)^2=P_1^2-P_1P_2-P_2P_1+P_2^2=P_1-P_2-P_2+P_2=P_1-P_2=P。故 P 幂等，是投影矩阵。
  - title: '必要性'
    content: |
      若 P=P_1-P_2 为投影矩阵，则 P^2=P，即 P_1-P_2=(P_1-P_2)^2=P_1-P_1P_2-P_2P_1+P_2，故 P_1P_2+P_2P_1=2P_2 (**)。
      左乘 P_1：P_1P_2+P_1P_2P_1=2P_1P_2，得 P_1P_2P_1=P_1P_2。
      右乘 P_1：P_1P_2P_1+P_2P_1=2P_2P_1，得 P_1P_2P_1=P_2P_1。
      故 P_1P_2=P_2P_1，代入 (**) 得 2P_1P_2=2P_2，即 P_1P_2=P_2P_1=P_2。
